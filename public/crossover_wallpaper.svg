<svg xmlns="http://www.w3.org/2000/svg" width="3840" height="2160" viewBox="0 0 1000 1000" style="background-color:#0a0a14;">
    <defs>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(137,180,250,0.15)" stroke-width="1"/>
        </pattern>
        <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
            <stop offset="60%" stop-color="transparent" />
            <stop offset="100%" stop-color="#0a0a14" />
        </radialGradient>
    </defs>

    <!-- Tech Grid Background -->
    <rect width="100%" height="100%" fill="url(#grid)" />

    <!-- Main Graphic Group -->
    <g opacity="0.6">
        <!-- Rick's Portal Rings -->
        <circle cx="500" cy="500" r="300" stroke="#a6e3a1" stroke-width="4" stroke-dasharray="10 20" fill="none" />
        <circle cx="500" cy="500" r="400" stroke="#cba6f7" stroke-width="2" fill="none" />
        <circle cx="500" cy="500" r="450" stroke="#f38ba8" stroke-width="8" stroke-dasharray="2 40" fill="none" />
        <path d="M 500 100 Q 600 500 500 900 Q 400 500 500 100" stroke="#89b4fa" stroke-width="2" fill="none" />
        <path d="M 100 500 Q 500 600 900 500 Q 500 400 100 500" stroke="#89b4fa" stroke-width="2" fill="none" />
        
        <!-- Gravity Falls Triangle & Zodiac Circle -->
        <polygon points="500,250 700,650 300,650" stroke="#f9e2af" stroke-width="6" stroke-dasharray="8 8" fill="none" />
        <circle cx="500" cy="500" r="40" stroke="#f9e2af" stroke-width="4" fill="none" />
        
        <!-- Big Hero 6 Microbots -->
        <circle cx="300" cy="300" r="15" fill="#cdd6f4" />
        <circle cx="700" cy="300" r="15" fill="#cdd6f4" />
        <circle cx="300" cy="700" r="15" fill="#cdd6f4" />
        <circle cx="700" cy="700" r="15" fill="#cdd6f4" />
        <line x1="300" y1="300" x2="500" y2="500" stroke="#cdd6f4" stroke-width="2" />
        <line x1="700" y1="300" x2="500" y2="500" stroke="#cdd6f4" stroke-width="2" />
        <line x1="300" y1="700" x2="500" y2="500" stroke="#cdd6f4" stroke-width="2" />
        <line x1="700" y1="700" x2="500" y2="500" stroke="#cdd6f4" stroke-width="2" />
    </g>

    <!-- Vignette -->
    <rect width="100%" height="100%" fill="url(#vignette)" />
</svg>
